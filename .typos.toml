[files]
ignore-files = true
extend-exclude = [
  # Generated docs assets: chroma syntax CSS (`hugo gen chromastyles`) and the
  # terminal snippets rendered from real `cooldown` output (scripts/terminals.sh).
  "docs/assets/**/*",
]

[default]
extend-ignore-re = [
  # "spellcheck:ignore-line" ignores the current line
  "(?Rm)^.*(#|//|--|<!--)\\s*spellcheck:ignore-line(\\s*-->)?\\s*$",

  # "spellcheck:ignore-next-line" ignores the next line
  "(?Rm)^.*(#|//|--|<!--)\\s*spellcheck:ignore-next-line.*?\\n.*?$",

  # "spellcheck:ignore-block" ignores all text in the following block (until the first empty line)
  "(?s)(#|//|--|<!--)\\s*spellcheck:ignore-block(.*?)(?:(?:\\r*\\n){2})",

  # ignores any text within "spellcheck:ignore-start" and "spellcheck:ignore-end"
  "(?s)(#|//|--|<!--)\\s*spellcheck:ignore-start.*?\\n.*?(#|//|--|<!--)\\s*spellcheck:ignore-end",
]

[default.extend-words]
certifi = "certifi"
