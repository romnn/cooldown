name: release
on:
  push:
    tags:
      - "*"

env:
  MISE_GITHUB_TOKEN: ${{ github.token }}
  MISE_LOCKED: "1"

permissions:
  contents: write
  packages: write

jobs:
  tests:
    uses: ./.github/workflows/test.yaml

  publish-crate:
    runs-on: ubuntu-24.04
    needs: [tests]
    steps:
      - uses: actions/checkout@v7
      - name: Resolve Rust toolchain from rust-toolchain.toml
        id: rust
        shell: bash
        run: |
          channel=$(sed -n 's/^channel[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' rust-toolchain.toml)
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust.outputs.channel }}
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Publish crates
        uses: romnn/publish-crates@main
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          resolve-versions: true
          publish-delay: 30s

  release:
    runs-on: ubuntu-24.04
    needs: [tests]
    outputs:
      precompiled-binaries: ${{ steps.upload.outputs.artifact-url }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Allow CI-only release file churn
        shell: bash
        run: |
          allowed_dirty_files=(
            mise.lock
          )
          git update-index --skip-worktree -- "${allowed_dirty_files[@]}"
      - uses: jdx/mise-action@v4
        with:
          install: false
          cache: true
      - run: mise install task
      - name: Release
        run: task release
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          TAP_GITHUB_TOKEN: "${{ secrets.TAP_GITHUB_TOKEN }}"
      - name: Upload precompiled binaries
        id: upload
        uses: actions/upload-artifact@v7
        with:
          name: goreleaser-dist
          path: goreleaser-dist
