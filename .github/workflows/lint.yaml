name: lint
on:
  push: {}
  pull_request:
    types: [opened, synchronize, reopened, edited]
  schedule:
    # 8AM first day of the month in JAN and JUNE to keep workflow badges up-to-date
    - cron: "0 8 1 1,6 *"

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Homebrew/actions/setup-homebrew@master
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          # Release targets (mirror .goreleaser.yaml); linted from Linux via zig.
          targets: x86_64-pc-windows-gnu, aarch64-pc-windows-gnullvm, x86_64-unknown-linux-musl, aarch64-unknown-linux-musl, x86_64-apple-darwin, aarch64-apple-darwin
      - run: |
          brew install ast-grep
          brew install cargo-audit
          brew install cargo-udeps
          brew install zig cargo-zigbuild
      # Cache the cross-target dependency artifacts — the per-target aws-lc-sys C
      # build is the expensive part. cache-on-failure keeps it even when clippy
      # fails, so a lint finding doesn't throw away the cross-compiled deps.
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Audit
        # cargo-audit flags advisories on dependencies we can't always fix
        # immediately (e.g. transitive/unmaintained crates); keep it informational
        # so a new advisory doesn't block the whole lint workflow.
        continue-on-error: true
        run: task audit --output group --output-group-error-only
      - name: Check for unused dependencies
        run: task unused-dependencies --output group --output-group-error-only
        env:
          RUSTUP_TOOLCHAIN: nightly
      - name: Lint
        run: task lint --output group --output-group-error-only
      # Cross-lint the full workspace for every release target from Linux. A plain
      # `clippy --target` can't do this: reqwest's aws-lc-sys compiles bundled
      # C/asm in its build script and won't cross-compile without a target
      # toolchain. cargo-zigbuild uses zig as the cross C compiler (bundled MinGW /
      # libc headers, no MSVC SDK or Xcode needed), so the C actually builds per
      # target and clippy checks every cfg(target_os)/cfg(unix) view.
      - name: Lint (all release targets)
        run: task lint:targets --output group --output-group-error-only

  goreleaser:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Homebrew/actions/setup-homebrew@master
      - run: brew install goreleaser
      - name: Check goreleaser config
        run: goreleaser check

  spellcheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Homebrew/actions/setup-homebrew@master
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          brew install typos-cli
      - name: Spellcheck
        run: task spellcheck --output group --output-group-error-only
