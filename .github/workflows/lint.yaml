# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/refs/heads/master/src/schemas/json/github-workflow.json
name: lint
on:
  push: {}
  pull_request:
    types: [opened, synchronize, reopened, edited]

env:
  MISE_GITHUB_TOKEN: ${{ github.token }}
  MISE_AUTO_INSTALL: "0"

jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
        with:
          install: false
          cache: true
          env: false
      - run: mise install task ast-grep zig github:romnn/cargo-feature-combinations aqua:rustsec/rustsec/cargo-audit github:est31/cargo-udeps github:rust-cross/cargo-zigbuild
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
      - name: Resolve Rust toolchain from rust-toolchain.toml
        id: rust
        shell: bash
        run: |
          channel=$(sed -n 's/^channel[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' rust-toolchain.toml)
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust.outputs.channel }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Audit
        continue-on-error: true
        run: task audit
      - name: Check for unused dependencies
        run: task unused-dependencies
      - name: Lint (all feature combinations × targets)
        run: task lint:fc

  spellcheck:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
        with:
          install: false
          cache: true
          env: false
      - run: mise install task typos
      - name: Spellcheck
        run: task spellcheck
