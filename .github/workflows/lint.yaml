name: lint
on:
  push: {}
  pull_request:
    types: [opened, synchronize, reopened, edited]
  schedule:
    # 8AM first day of the month in JAN and JUNE to keep workflow badges up-to-date
    - cron: "0 8 1 1,6 *"

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Homebrew/actions/setup-homebrew@master
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: x86_64-pc-windows-msvc
      - run: |
          brew install ast-grep
          brew install cargo-audit
          brew install cargo-udeps
      - name: Audit
        # cargo-audit flags advisories on dependencies we can't always fix
        # immediately (e.g. transitive/unmaintained crates); keep it informational
        # so a new advisory doesn't block the whole lint workflow.
        continue-on-error: true
        run: task audit --output group --output-group-error-only
      - name: Check for unused dependencies
        run: task unused-dependencies --output group --output-group-error-only
        env:
          RUSTUP_TOOLCHAIN: nightly
      - name: Lint
        run: task lint --output group --output-group-error-only
      # The only platform-divergent code is the cfg(unix) block in
      # cooldown-core::error, so scope the Windows cfg cross-check to that crate.
      # A --workspace check would drag in reqwest's aws-lc-sys, whose build script
      # compiles bundled C/asm and cannot cross-compile to windows-msvc on the
      # Linux runner. cooldown-core pulls no native-C deps, so clippy (check-only)
      # needs no Windows runner or MSVC linker.
      - name: Lint (windows target cross-check)
        run: cargo lint -p cooldown-core --all-features --target x86_64-pc-windows-msvc

  goreleaser:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Homebrew/actions/setup-homebrew@master
      - run: brew install goreleaser
      - name: Check goreleaser config
        run: goreleaser check

  spellcheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Homebrew/actions/setup-homebrew@master
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          brew install typos-cli
      - name: Spellcheck
        run: task spellcheck --output group --output-group-error-only
