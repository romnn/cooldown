# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  ZIGBUILD_IMAGE: ghcr.io/rust-cross/cargo-zigbuild:latest
  GORELEASER_VERSION: "2.17.0"

tasks:
  default:
    cmds:
      - task: run

  run:
    desc: "run"
    ignore_error: true
    interactive: true
    cmds:
      - cargo run -- {{.CLI_ARGS}}

  build:
    desc: "build in debug mode"
    cmds:
      - cargo build --all-targets {{.CLI_ARGS}}

  build:fc:
    desc: "build in debug mode for all combinations of features"
    cmds:
      - cargo fc build --all-targets {{.CLI_ARGS}}

  build:release:
    desc: "build in release mode"
    cmds:
      - cargo build --all-targets --release {{.CLI_ARGS}}

  goreleaser:
    internal: true
    requires:
      vars: [GORELEASER_ARGS]
    cmds:
      # The image ships zig, cargo-zigbuild, rust and every release target; only goreleaser
      # is missing. safe.directory: the bind-mounted repo is owned by another uid.
      # prettier-ignore
      - >-
        docker run --rm
        -e GITHUB_TOKEN -e TAP_GITHUB_TOKEN
        -e "HOST_UID=$(id -u)" -e "HOST_GID=$(id -g)"
        -v "${PWD}:/workspace" -w /workspace
        {{.ZIGBUILD_IMAGE}}
        bash -euo pipefail -c '
        fix_perms() { for d in target target-goreleaser goreleaser-dist; do [ -e "$d" ] && chown -R "${HOST_UID}:${HOST_GID}" "$d" || true; done; };
        trap fix_perms EXIT;
        case "$(uname -m)" in x86_64) arch=x86_64 ;; aarch64|arm64) arch=arm64 ;; *) echo "unsupported arch" >&2; exit 1 ;; esac;
        curl -sSfL "https://github.com/goreleaser/goreleaser/releases/download/v{{.GORELEASER_VERSION}}/goreleaser_Linux_${arch}.tar.gz" | tar -xz -C /usr/local/bin goreleaser;
        git config --global --add safe.directory "$(pwd)";
        goreleaser {{.GORELEASER_ARGS}}'

  build:goreleaser:
    desc: "build in release mode using goreleaser"
    cmds:
      - task: goreleaser
        vars: { GORELEASER_ARGS: "build --snapshot --clean" }

  release:
    desc: "release using goreleaser"
    cmds:
      - task: goreleaser
        vars: { GORELEASER_ARGS: "release --clean" }

  typos:
    desc: "check repository for typos"
    aliases: [spellcheck]
    cmds:
      - typos

  check:
    desc: "check cargo workspace"
    dir: "{{.ROOT_DIR}}"
    cmds:
      - cargo check --workspace --all-targets {{.CLI_ARGS}}

  check:fc:
    desc: "check cargo workspace for all combinations of features"
    dir: "{{.ROOT_DIR}}"
    cmds:
      - cargo fc check --all-targets {{.CLI_ARGS}}

  clean:
    desc: "clean cargo workspace"
    cmds:
      - cargo clean {{.CLI_ARGS}}

  docs:
    desc: "open documentation preview"
    env:
      RUSTDOCFLAGS: "--cfg docsrs"
    cmds:
      - cargo +nightly watchdoc --all-features {{.CLI_ARGS}}

  screenshots:
    desc: "regenerate the README screenshots (needs charmbracelet/freeze)"
    cmds:
      - bash scripts/screenshots.sh

  outdated:
    desc: "list outdated deps (incl. new majors): adoptable now vs still in cooldown"
    cmds:
      - cargo run -- outdated --sync {{.CLI_ARGS}}

  outdated:minor:
    desc: "list outdated deps within the current major only"
    cmds:
      - cargo run -- outdated --no-major --sync {{.CLI_ARGS}}

  upgrade:
    desc: "upgrade all deps incl. cross-major bumps, within the cooldown"
    aliases: [update]
    cmds:
      - cargo run -- upgrade --major --sync {{.CLI_ARGS}}

  upgrade:minor:
    desc: "upgrade all deps within their current major, within the cooldown"
    cmds:
      - cargo run -- upgrade --no-major --sync {{.CLI_ARGS}}

  upgrade:latest:
    desc: "upgrade ignoring the cooldown window — use deliberately"
    prompt:
      - "DANGER: this bypasses the supply-chain cooldown and adopts brand-new (possibly compromised) releases. Prefer 'task upgrade' / 'task upgrade:minor'. Continue?"
    cmds:
      - cargo run -- upgrade --latest {{.CLI_ARGS}}

  unused:
    desc: "check for unused cargo workspace dependencies"
    aliases: [unused-dependencies]
    cmds:
      - cargo +nightly udeps --workspace --all-targets {{.CLI_ARGS}}

  audit:
    desc: "audit cargo workspace dependencies"
    cmds:
      - cargo audit {{.CLI_ARGS}}

  format:
    desc: "format cargo workspace"
    cmds:
      - cargo fmt --all {{.CLI_ARGS}}

  test:
    desc: "test cargo workspace (unit only; nextest default profile)"
    aliases: [test:unit]
    cmds:
      - cargo nextest run -P default --workspace --all-targets --no-tests "warn" {{.CLI_ARGS}}

  test:fc:
    desc: "test cargo workspace for all combinations of features"
    cmds:
      - cargo fc nextest run -P default --all-targets --no-tests "warn" {{.CLI_ARGS}}

  test:integration:
    desc: "run the real-tool integration tests (drive uv/cargo/go/npm/pnpm against live registries; needs the mise.toml toolchain + network)"
    cmds:
      - cargo nextest run -P integration --workspace --all-targets --no-tests "warn" {{.CLI_ARGS}}

  test:all:
    desc: "run the full suite: unit + the real-tool integration tests (nextest ci profile)"
    aliases: [test:ci]
    cmds:
      - cargo nextest run -P ci --workspace --all-targets --no-tests "warn" {{.CLI_ARGS}}

  test:doc:
    desc: "run doctests in cargo workspace"
    cmds:
      - cargo test --doc --workspace {{.CLI_ARGS}}

  lint:ast-grep:
    desc: "lint with ast-grep rules"
    cmds:
      - sg scan

  lint:
    desc: "lint cargo workspace"
    cmds:
      - cargo lint --workspace --all-features {{.CLI_ARGS}}
      - task: lint:ast-grep

  lint:fc:
    desc: "lint every feature combination across all configured targets (the lint gate)"
    cmds:
      - cargo fc lint {{.CLI_ARGS}}
      - task: lint:ast-grep

  lint:fix:
    desc: "lint and fix cargo workspace"
    aliases: [fix]
    cmds:
      - cargo fixit --workspace --all-features {{.CLI_ARGS}}
      - task: lint:ast-grep

  lint:actions:
    desc: "lint github actions"
    cmds:
      - actionlint
