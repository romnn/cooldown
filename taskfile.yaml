# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"
tasks:
  default:
    cmds:
      - task: run

  run:
    desc: "run"
    ignore_error: true
    interactive: true
    cmds:
      - cargo run -- {{.CLI_ARGS}}

  build:
    desc: "build in debug mode"
    cmds:
      - cargo build --all-targets {{.CLI_ARGS}}

  build:fc:
    desc: "build in debug mode for all combinations of features"
    cmds:
      - cargo fc build --all-targets {{.CLI_ARGS}}

  build:release:
    desc: "build in release mode"
    cmds:
      - cargo build --all-targets --release {{.CLI_ARGS}}

  build:goreleaser:
    desc: "build in release mode using goreleaser"
    cmds:
      # pretter-ignore
      - >-
        docker run --rm
        -e "HOST_UID=$(id -u)"
        -e "HOST_GID=$(id -g)"
        -v "${PWD}:/workspace"
        -w /workspace
        ghcr.io/rust-cross/cargo-zigbuild
        bash -c 'set -euo pipefail;
        fix_perms() { for d in target target-goreleaser goreleaser-dist; do [ -e "$d" ] && chown -R "${HOST_UID}:${HOST_GID}" "$d" || true; done; };
        trap fix_perms EXIT;
        ./release.sh && goreleaser build --snapshot --clean'

  release:
    desc: "release using goreleaser"
    cmds:
      # pretter-ignore
      - >-
        docker run --rm
        -e "GITHUB_TOKEN=${GITHUB_TOKEN}"
        -e "TAP_GITHUB_TOKEN=${TAP_GITHUB_TOKEN}"
        -e "HOST_UID=$(id -u)"
        -e "HOST_GID=$(id -g)"
        -v "${PWD}:/workspace"
        -w /workspace
        ghcr.io/rust-cross/cargo-zigbuild
        bash -c 'set -euo pipefail;
        fix_perms() { for d in target target-goreleaser goreleaser-dist; do [ -e "$d" ] && chown -R "${HOST_UID}:${HOST_GID}" "$d" || true; done; };
        trap fix_perms EXIT;
        ./release.sh && goreleaser release --clean'

  typos:
    desc: "check repository for typos"
    aliases: [spellcheck]
    cmds:
      - typos

  check:
    desc: "check cargo workspace"
    dir: "{{.ROOT_DIR}}"
    cmds:
      - cargo check --workspace --all-targets {{.CLI_ARGS}}

  check:fc:
    desc: "check cargo workspace for all combinations of features"
    dir: "{{.ROOT_DIR}}"
    cmds:
      - cargo fc check --workspace --all-targets {{.CLI_ARGS}}

  clean:
    desc: "clean cargo workspace"
    cmds:
      - cargo clean {{.CLI_ARGS}}

  docs:
    desc: "open documentation preview"
    env:
      RUSTDOCFLAGS: "--cfg docsrs"
    cmds:
      - cargo +nightly watchdoc --all-features {{.CLI_ARGS}}

  screenshots:
    desc: "regenerate the README screenshots (needs charmbracelet/freeze)"
    cmds:
      - bash scripts/screenshots.sh

  outdated:
    desc: "check for outdated cargo workspace dependencies"
    cmds:
      - cargo run -- outdated --sync {{.CLI_ARGS}}

  outdated:legacy:
    desc: "check for outdated cargo workspace dependencies"
    cmds:
      - cargo outdated --workspace --ignore-external-rel --exit-code 1 -v {{.CLI_ARGS}}

  upgrade:
    desc: "upgrade outdated cargo workspace dependencies"
    cmds:
      - cargo run -- upgrade --major --sync {{.CLI_ARGS}}

  unused:
    desc: "check for unused cargo workspace dependencies"
    aliases: [unused-dependencies]
    # udeps needs a nightly compiler (-Z binary-dep-depinfo); MISE_RUST_VERSION
    # selects the nightly toolchain from mise.toml for every nested cargo shim
    # udeps spawns, instead of the pinned-stable primary.
    env:
      MISE_RUST_VERSION: nightly
    cmds:
      - cargo +nightly udeps --workspace --all-targets {{.CLI_ARGS}}

  audit:
    desc: "audit cargo workspace dependencies"
    cmds:
      - cargo audit {{.CLI_ARGS}}

  format:
    desc: "format cargo workspace"
    cmds:
      - cargo fmt --all {{.CLI_ARGS}}

  test:
    desc: "test cargo workspace (unit only; nextest default profile)"
    aliases: [test:unit]
    cmds:
      - cargo nextest run -P default --workspace --all-targets --no-tests "warn" {{.CLI_ARGS}}

  test:fc:
    desc: "test cargo workspace for all combinations of features"
    cmds:
      - cargo fc nextest run -P default --workspace --all-targets --no-tests "warn" {{.CLI_ARGS}}

  test:integration:
    desc: "run the real-tool integration tests (drive uv/cargo/go/pnpm against live registries; needs the mise.toml toolchain + network)"
    cmds:
      - cargo nextest run -P integration --workspace --all-targets --no-tests "warn" {{.CLI_ARGS}}

  test:all:
    desc: "run the full suite: unit + the real-tool integration tests (nextest ci profile)"
    aliases: [test:ci]
    cmds:
      - cargo nextest run -P ci --workspace --all-targets --no-tests "warn" {{.CLI_ARGS}}

  test:doc:
    desc: "run doctests in cargo workspace"
    cmds:
      - cargo test --doc --workspace {{.CLI_ARGS}}

  lint:ast-grep:
    desc: "lint with ast-grep rules"
    cmds:
      - sg scan

  lint:
    desc: "lint cargo workspace"
    cmds:
      - cargo lint --workspace --all-features {{.CLI_ARGS}}
      - task: lint:ast-grep

  lint:fc:
    desc: "lint cargo workspace for all combinations of features"
    cmds:
      - cargo fc lint {{.CLI_ARGS}}
      - task: lint:ast-grep

  lint:targets:
    desc: "clippy the full workspace for every release target (needs zig + cargo-zigbuild on PATH)"
    # Targets mirror .goreleaser.yaml. cargo-zigbuild drives clippy with zig as the
    # cross C compiler, so native build-script deps (reqwest's aws-lc-sys) actually
    # cross-compile per target instead of failing the way a plain `clippy --target`
    # does on the Linux runner. cfg(windows)/cfg(unix) coverage comes for free; the
    # gnu ABI matches what we ship (we never build windows-msvc).
    cmds:
      - >-
        cargo-zigbuild clippy --workspace --all-features --all-targets --no-deps
        --target x86_64-pc-windows-gnu
        --target aarch64-pc-windows-gnullvm
        --target x86_64-unknown-linux-musl
        --target aarch64-unknown-linux-musl
        --target x86_64-apple-darwin
        --target aarch64-apple-darwin
        {{.CLI_ARGS}}

  lint:fix:
    desc: "lint and fix cargo workspace"
    aliases: [fix]
    cmds:
      - cargo fixit --workspace --all-features {{.CLI_ARGS}}
      - task: lint:ast-grep

  lint:actions:
    desc: "lint github actions"
    cmds:
      - actionlint
