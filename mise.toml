# Pinned package managers for cooldown's integration tests.
#
# These provision the REAL tools the integration suite drives end to end (see
# crates/cooldown/tests/convergence_uv.rs and the harness in tests/support/). The tests
# generate fixtures on the fly and run the actual resolver, so the toolchain must be pinned
# to keep runs reproducible across machines and over time.
#
# `rust` lists two toolchains. The first, `1.96.0`, is the primary: it is the version already
# active on this machine, so it stays first and adding this file does NOT switch the toolchain
# under cooldown's own `cargo build`. The second, `nightly`, exists only so `task unused`
# (`cargo udeps`) has a nightly compiler to run under — udeps needs `-Z binary-dep-depinfo`,
# which stable rejects. The task selects it with `MISE_RUST_VERSION=nightly`; everything else
# keeps using the primary `1.96.0`. The integration-test versions below are each an exact
# `mise ls-remote <tool>` hit (verified), not an invented tag; the cross-compile lint tooling
# (`zig`, `cargo-zigbuild`) instead tracks `latest`, pinned exactly by the committed `mise.lock`.
#
# conda is intentionally omitted: it has no clean mise-managed backend here (`mise ls-remote
# conda` returns nothing), so pinning it would be a ghost. A real-tool conda integration test
# would need a conda provisioned some other way; the cooldown-conda adapter is otherwise covered
# by the network-free conformance tests.
[tools]
rust = ["1.96.0", "nightly"]
uv = "0.11.23"
go = "1.26.4"
node = "26.3.1"
pnpm = "11.8.0"
python = "3.14.6"
ruby = "4.0.5"
erlang = "29.0.2"
elixir = "1.20.1-otp-29"
java = "26.0.1"
maven = "3.9.16"
deno = "2.8.3"
swift = "6.3.2"

# Cross-compile tooling for `task lint:targets` (clippy every release target) and the
# goreleaser build. cargo-zigbuild uses the `github:` backend so mise fetches the prebuilt
# release binary instead of compiling it from source (the `cargo:` backend would). Both
# track `latest` and are pinned exactly by the committed mise.lock.
zig = "latest"
"github:rust-cross/cargo-zigbuild" = "latest"
