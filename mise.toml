# Pinned package managers for cooldown's integration tests.
#
# These provision the REAL tools the integration suite drives end to end (see
# crates/cooldown/tests/convergence_uv.rs and the harness in tests/support/). The tests
# generate fixtures on the fly and run the actual resolver, so the toolchain must be pinned
# to keep runs reproducible across machines and over time.
#
# The Rust toolchain is NOT managed here: it comes from `rust-toolchain.toml` (pinned `1.96.0`)
# installed via `dtolnay/rust-toolchain` in CI, so mise's shims never shadow the build compiler
# (and a bare `cargo +nightly` works for `task unused`/udeps without a MISE_RUST_VERSION hack).
# The integration-test versions below are each an exact `mise ls-remote <tool>` hit (verified),
# not an invented tag; the developer/lint tooling (`zig`, `cargo-zigbuild`, …) tracks `latest`,
# pinned exactly by the committed `mise.lock`.
#
# conda is intentionally omitted: it has no clean mise-managed backend here (`mise ls-remote
# conda` returns nothing), so pinning it would be a ghost. A real-tool conda integration test
# would need a conda provisioned some other way; the cooldown-conda adapter is otherwise covered
# by the network-free conformance tests.
[tools]
uv = "0.11.23"
go = "1.26.4"
node = "26.3.1"
pnpm = "11.8.0"
python = "3.14.6"
ruby = "4.0.5"
erlang = "29.0.2"
elixir = "1.20.1-otp-29"
java = "26.0.1"
maven = "3.9.16"
deno = "2.8.3"
swift = "6.3.2"

# Developer tools
zig = "latest"
task = "latest"
ast-grep = "latest"
typos = "latest"
actionlint = "latest"
goreleaser = "latest"
"aqua:charmbracelet/freeze" = "latest"

# Documentation site (docs/, Hugo + hugo-book theme). go (above) is shared with the
# integration tests; the theme is a Hugo module, so `hugo` shells out to `go` at build
# time. The theme compiles SCSS, which needs the *extended* Hugo build (the default aqua
# package is non-extended), so pull extended via asdf. terminal-to-html renders the ANSI
# terminal snippets to HTML (scripts/terminals.sh).
"asdf:NeoHsu/asdf-hugo" = "extended-0.163.3"
"github:buildkite/terminal-to-html" = "latest"

# Cargo plugins
"github:rust-cross/cargo-zigbuild" = "latest"
"github:romnn/cargo-watchdoc" = { version = "latest", minimum_release_age = "0" }
"aqua:rustsec/rustsec/cargo-audit" = "latest"
"github:romnn/cargo-feature-combinations" = { version = "latest", matching = "cargo-fc", minimum_release_age = "0" }
"github:est31/cargo-udeps" = "latest"
"aqua:nextest-rs/nextest/cargo-nextest" = "latest"

[settings]
lockfile = true
lockfile_platforms = [
  "linux-x64",
  "macos-arm64",
  "windows-x64",
]
